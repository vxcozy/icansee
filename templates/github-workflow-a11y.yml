# icansee: full Playwright + axe-core accessibility audit on every PR.
#
# Runs against the built+served site, so it catches what a static pre-commit
# gate cannot: rendered-DOM contrast, landmark coverage, focus state,
# and (in v0.3+) dark-mode contrast via prefers-color-scheme emulation.
# Same engine as the Vercel toolbar's Accessibility Audit Tool.
#
# Routes (and color modes) are read from .icansee/routes.json. Legacy
# array form scans "/" in light mode only. New object form lets you
# opt into dark-mode scanning:
#
#   {"routes": ["/", "/dashboard"], "modes": ["light", "dark"]}
#
# Playwright bundles its own Chromium (cached across runs), so there is
# no ChromeDriver version-mismatch class of failures here. Runner deps
# live in .icansee/node_modules, kept separate from the user's own deps.
#
# This workflow assumes the project has package.json with `build` and
# `start` (or `preview`) scripts. For plain-HTML projects, customize the
# Build / Start steps below or set ICANSEE_SERVE_CMD as a repo variable.

name: Accessibility audit (axe-core)

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  axe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install project deps
        run: npm ci

      - name: Install icansee runner deps
        # .icansee/package.json pins playwright + @axe-core/playwright.
        run: npm install --prefix .icansee --no-audit --no-fund

      - name: Cache Playwright browsers
        # Chromium binary lives in ~/.cache/ms-playwright on Linux.
        # Keyed on .icansee/package.json so a runner-version bump invalidates.
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('.icansee/package.json') }}

      - name: Install Playwright OS deps
        # Installs system libraries (fonts, libnss3, etc.) the headless
        # browser needs. Fast even on cache-miss; safe to always run.
        run: cd .icansee && npx playwright install-deps chromium

      - name: Install Playwright chromium binary
        # Skipped on cache hit (saves ~150MB download).
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd .icansee && npx playwright install chromium

      - name: Build
        run: npm run build

      - name: Start app and run axe-core
        run: |
          # Start the app in the background. Override SERVE_CMD via env if your
          # project uses a different start command (e.g. `npm run preview`).
          SERVE_CMD="${SERVE_CMD:-npm start}"
          $SERVE_CMD &
          APP_PID=$!
          # Wait for the server. Override BASE_URL if not localhost:3000.
          BASE_URL="${BASE_URL:-http://localhost:3000}"
          npx --yes wait-on "$BASE_URL" --timeout 60000

          BASE_URL="$BASE_URL" node .icansee/axe-runner.mjs
          STATUS=$?

          kill $APP_PID || true
          exit $STATUS
        env:
          # Set in repo settings if you need a custom port or start command.
          BASE_URL: ${{ vars.ICANSEE_BASE_URL }}
          SERVE_CMD: ${{ vars.ICANSEE_SERVE_CMD }}
